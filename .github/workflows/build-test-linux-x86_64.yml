name: Build and test Linux x86_64 wheels

on:
    pull_request:
    push:
        branches:
            - main
            - nightly
            - release/*
        tags:
            # NOTE: Binary build pipelines should only get triggered on release candidate builds
            # Release candidate tags look like: v1.11.0-rc1
            - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
    workflow_dispatch:

jobs:
    generate-matrix:
        uses: pytorch/test-infra/.github/workflows/generate_binary_build_matrix.yml@main
        with:
            package-type: wheel
            os: linux
            test-infra-repository: pytorch/test-infra
            test-infra-ref: main
            with-rocm: false
            with-cpu: false

    filter-matrix:
        needs: [generate-matrix]
        outputs:
            matrix: ${{ steps.generate.outputs.matrix }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.11"
            - uses: actions/checkout@v6
              with:
                  repository: pytorch/tensorrt
            - name: Generate matrix
              id: generate
              run: |
                  set -eou pipefail
                  MATRIX_BLOB=${{ toJSON(needs.generate-matrix.outputs.matrix) }}
                  MATRIX_BLOB="$(python3 .github/scripts/filter-matrix.py --matrix "${MATRIX_BLOB}")"
                  echo "${MATRIX_BLOB}"
                  echo "matrix=${MATRIX_BLOB}" >> "${GITHUB_OUTPUT}"

    build:
        needs: filter-matrix
        permissions:
            id-token: write
            contents: read
        strategy:
            fail-fast: false
            matrix:
                include:
                    - repository: pytorch/tensorrt
                      pre-script: packaging/pre_build_script.sh
                      env-var-script: packaging/env_vars.txt
                      post-script: packaging/post_build_script.sh
                      smoke-test-script: packaging/smoke_test_script.sh
                      package-name: torch_tensorrt
                      display-name: Build Linux x86_64 torch-tensorrt whl package
        name: ${{ matrix.display-name }}
        uses: ./.github/workflows/build_linux.yml
        with:
            repository: ${{ matrix.repository }}
            ref: ""
            test-infra-repository: pytorch/test-infra
            test-infra-ref: main
            build-matrix: ${{ needs.filter-matrix.outputs.matrix }}
            pre-script: ${{ matrix.pre-script }}
            env-var-script: ${{ matrix.env-var-script }}
            post-script: ${{ matrix.post-script }}
            package-name: ${{ matrix.package-name }}
            smoke-test-script: ${{ matrix.smoke-test-script }}
            trigger-event: ${{ github.event_name }}
            architecture: "x86_64"
            use-rtx: false
            pip-install-torch-extra-args: "--extra-index-url https://pypi.org/simple"

    executorch-static-build:
        needs: [filter-matrix, build]
        uses: ./.github/workflows/executorch-static-linux.yml
        with:
          repository: "pytorch/tensorrt"
          ref: ""
          test-infra-repository: pytorch/test-infra
          test-infra-ref: main
          build-matrix: ${{ needs.filter-matrix.outputs.matrix }}


    L0-dynamo-converter-tests:
        name: ${{ matrix.display-name }}
        needs: [filter-matrix, build]
        if: ${{ (github.ref_name == 'main' || github.ref_name == 'nightly' || startsWith(github.ref_name, 'release/') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc')) || contains(github.event.pull_request.labels.*.name, 'Force All Tests[L0+L1+L2]')) && always() || success() }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - repository: pytorch/tensorrt
                      package-name: torch_tensorrt
                      pre-script: packaging/pre_build_script.sh
                      post-script: packaging/post_build_script.sh
                      smoke-test-script: packaging/smoke_test_script.sh
                      display-name: L0 dynamo converter tests
        uses: ./.github/workflows/linux-test.yml
        with:
            job-name: L0-dynamo-converter-tests
            repository: "pytorch/tensorrt"
            ref: ""
            test-infra-repository: pytorch/test-infra
            test-infra-ref: main
            build-matrix: ${{ needs.filter-matrix.outputs.matrix }}
            pre-script: ${{ matrix.pre-script }}
            script: |
                set -euo pipefail
                # Pull in trt_pytest (reruns + reproduce hint). One source of truth
                # for the rerun regex; see tests/py/ci_helpers.sh.
                source tests/py/ci_helpers.sh
                pushd .
                cd tests/py/dynamo
                trt_pytest -ra -n 8 --junitxml=${RUNNER_TEST_RESULTS_DIR}/l0_dynamo_converter_tests_results.xml  --dist=loadscope --maxfail=20 conversion/
                popd

    L0-dynamo-core-tests:
        name: ${{ matrix.display-name }}
        needs: [filter-matrix, build]
        if: ${{ (github.ref_name == 'main' || github.ref_name == 'nightly' || startsWith(github.ref_name, 'release/') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc')) || contains(github.event.pull_request.labels.*.name, 'Force All Tests[L0+L1+L2]')) && always() || success() }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - repository: pytorch/tensorrt
                      package-name: torch_tensorrt
                      pre-script: packaging/pre_build_script.sh
                      post-script: packaging/post_build_script.sh
                      smoke-test-script: packaging/smoke_test_script.sh
                      display-name: L0 dynamo core tests
        uses: ./.github/workflows/linux-test.yml
        with:
            job-name: L0-dynamo-core-tests
            repository: "pytorch/tensorrt"
            ref: ""
            test-infra-repository: pytorch/test-infra
            test-infra-ref: main
            build-matrix: ${{ needs.filter-matrix.outputs.matrix }}
            pre-script: ${{ matrix.pre-script }}
            script: |
                set -euo pipefail
                # Pull in trt_pytest (reruns + reproduce hint). One source of truth
                # for the rerun regex; see tests/py/ci_helpers.sh.
                source tests/py/ci_helpers.sh
                pushd .
                cd tests/py
                cd dynamo
                trt_pytest -ra -n 8 --junitxml=${RUNNER_TEST_RESULTS_DIR}/l0_dynamo_core_runtime_tests_results.xml runtime/test_000_*
                trt_pytest -ra -n 8 --junitxml=${RUNNER_TEST_RESULTS_DIR}/l0_dynamo_core_partitioning_tests_results.xml partitioning/test_000_*
                trt_pytest -ra -n 8 --junitxml=${RUNNER_TEST_RESULTS_DIR}/l0_dynamo_core_lowering_tests_results.xml lowering/
                trt_pytest -ra -n 8 --junitxml=${RUNNER_TEST_RESULTS_DIR}/l0_dynamo_hlo_tests_results.xml hlo/
                popd

    L0-py-core-tests:
        name: ${{ matrix.display-name }}
        needs: [filter-matrix, build]
        if: ${{ (github.ref_name == 'main' || github.ref_name == 'nightly' || startsWith(github.ref_name, 'release/') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc')) || contains(github.event.pull_request.labels.*.name, 'Force All Tests[L0+L1+L2]')) && always() || success() }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - repository: pytorch/tensorrt
                      package-name: torch_tensorrt
                      pre-script: packaging/pre_build_script.sh
                      post-script: packaging/post_build_script.sh
                      smoke-test-script: packaging/smoke_test_script.sh
                      display-name: L0 core python tests
        uses: ./.github/workflows/linux-test.yml
        with:
            job-name: L0-py-core-tests
            repository: "pytorch/tensorrt"
            ref: ""
            test-infra-repository: pytorch/test-infra
            test-infra-ref: main
            build-matrix: ${{ needs.filter-matrix.outputs.matrix }}
            pre-script: ${{ matrix.pre-script }}
            script: |
                set -euo pipefail
                # Pull in trt_pytest (reruns + reproduce hint). One source of truth
                # for the rerun regex; see tests/py/ci_helpers.sh.
                source tests/py/ci_helpers.sh
                pushd .
                cd tests/py/core
                trt_pytest -ra -n 8 --junitxml=${RUNNER_TEST_RESULTS_DIR}/l0_py_core_tests_results.xml  .
                popd

    L0-torchscript-tests:
        name: ${{ matrix.display-name }}
        needs: [filter-matrix, build]
        if: ${{ (github.ref_name == 'main' || github.ref_name == 'nightly' || startsWith(github.ref_name, 'release/') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc')) || contains(github.event.pull_request.labels.*.name, 'Force All Tests[L0+L1+L2]')) && always() || success() }}
        strategy:
            fail-fast: false
            matrix:
                include:
