                python -m pip install pyyaml "executorch>=1.3.1"
                python -m pytest -ra --junitxml=${RUNNER_TEST_RESULTS_DIR}/l2_dynamo_executorch_tests_results.xml executorch/
                popd

    L2-dynamo-plugin-tests:
        name: ${{ matrix.display-name }}
        needs:
            [
