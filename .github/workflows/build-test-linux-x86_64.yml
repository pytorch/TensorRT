            test-infra-ref: main
            build-matrix: ${{ needs.filter-matrix.outputs.matrix }}
            pre-script: ${{ matrix.pre-script }}
            script: |
                set -euo pipefail
                # Pull in trt_pytest (reruns + reproduce hint). One source of truth
