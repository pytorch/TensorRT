# Reusable core for the Linux x86_64 build+test pipeline.
#
# Both build-test-linux-x86_64.yml (standard TensorRT) and
# build-test-linux-x86_64_rtx.yml (TensorRT-RTX) call this with use-rtx
# false/true. Keep ALL build/test logic here so a change lands once.
#
# RTX differences are expressed two ways:
#   * Jobs that only exist for standard TRT (torchscript, distributed,
#     executorch) are gated with ``if: ${{ !inputs.use-rtx && ... }}``.
#   * Jobs whose pytest scope differs branch inside the script on the
#     ``$USE_TRT_RTX`` env var that linux-test.yml exports.
#
# The per-job pass/fail map is bubbled up via the ``results`` output so the
# thin caller workflows can render a single ``ci-rollup`` status check whose
# name (e.g. "CI / Linux x86_64") stays stable for branch protection.
name: _linux-x86_64-core

on:
  workflow_call:
    inputs:
      use-rtx:
        description: "Build/test against TensorRT-RTX instead of standard TensorRT"
        type: boolean
        default: false
      name-prefix:
        description: "Display-name prefix for the build job (e.g. 'RTX - ')"
        type: string
        default: ""
    outputs:
      results:
        description: "JSON map of {job-id: {result, outputs}} for every build/test job"
        value: ${{ jobs.collect-results.outputs.results }}

jobs:
  generate-matrix:
    uses: pytorch/test-infra/.github/workflows/generate_binary_build_matrix.yml@main
    with:
      package-type: wheel
      os: linux
      test-infra-repository: pytorch/test-infra
      test-infra-ref: main
      with-rocm: false
      with-cpu: false

  filter-matrix:
    needs: [generate-matrix]
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/checkout@v6
        with:
          repository: pytorch/tensorrt
      - name: Generate matrix
        id: generate
        run: |
          set -eou pipefail
          MATRIX_BLOB=${{ toJSON(needs.generate-matrix.outputs.matrix) }}
          LIMIT_PR=${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          MATRIX_BLOB="$(python3 .github/scripts/filter-matrix.py --use-rtx ${{ inputs.use-rtx }} --limit-pr-builds "${LIMIT_PR}" --matrix "${MATRIX_BLOB}")"
          echo "${MATRIX_BLOB}"
          echo "matrix=${MATRIX_BLOB}" >> "${GITHUB_OUTPUT}"

  build:
    needs: filter-matrix
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - repository: pytorch/tensorrt
            pre-script: packaging/pre_build_script.sh
            env-var-script: packaging/env_vars.txt
            post-script: packaging/post_build_script.sh
            smoke-test-script: packaging/smoke_test_script.sh
            package-name: torch_tensorrt
            display-name: ${{ inputs.name-prefix }}Build Linux x86_64 torch-tensorrt whl package
    name: ${{ matrix.display-name }}
    uses: ./.github/workflows/build_linux.yml
    with:
      repository: ${{ matrix.repository }}
      ref: ""
      test-infra-repository: pytorch/test-infra
      test-infra-ref: main
      build-matrix: ${{ needs.filter-matrix.outputs.matrix }}
      pre-script: ${{ matrix.pre-script }}
      env-var-script: ${{ matrix.env-var-script }}
      post-script: ${{ matrix.post-script }}
      package-name: ${{ matrix.package-name }}
      smoke-test-script: ${{ matrix.smoke-test-script }}
      trigger-event: ${{ github.event_name }}
      architecture: "x86_64"
      use-rtx: ${{ inputs.use-rtx }}
      pip-install-torch-extra-args: "--extra-index-url https://pypi.org/simple"

  # Standard-TRT only: ExecuTorch static build is not part of the RTX matrix.
  executorch-static-build:
    needs: [filter-matrix, build]
    if: ${{ !inputs.use-rtx }}
    uses: ./.github/workflows/executorch-static-linux.yml
    with:
      repository: "pytorch/tensorrt"
      ref: ""
      test-infra-repository: pytorch/test-infra
      test-infra-ref: main
      build-matrix: ${{ needs.filter-matrix.outputs.matrix }}

  L0-dynamo-converter-tests:
    name: ${{ matrix.display-name }}
    needs: [filter-matrix, build]
    if: ${{ (github.ref_name == 'main' || github.ref_name == 'nightly' || startsWith(github.ref_name, 'release/') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc')) || contains(github.event.pull_request.labels.*.name, 'Force All Tests[L0+L1+L2]')) && always() || success() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - repository: pytorch/tensorrt
            package-name: torch_tensorrt
            pre-script: packaging/pre_build_script.sh
            post-script: packaging/post_build_script.sh
            smoke-test-script: packaging/smoke_test_script.sh
            display-name: L0 dynamo converter tests
    uses: ./.github/workflows/linux-test.yml
    with:
      job-name: L0-dynamo-converter-tests
      repository: "pytorch/tensorrt"
      ref: ""
      test-infra-repository: pytorch/test-infra
      test-infra-ref: main
      build-matrix: ${{ needs.filter-matrix.outputs.matrix }}
      pre-script: ${{ matrix.pre-script }}
      use-rtx: ${{ inputs.use-rtx }}
      script: |
          set -euo pipefail
          # Tier definition lives in tests/py/ci_helpers.sh (single source of
          # truth, shared with the local `just` recipes). USE_TRT_RTX is exported
          # by this workflow's caller.
          source tests/py/ci_helpers.sh
          trt_tier_l0_converter
  L0-dynamo-core-tests:
    name: ${{ matrix.display-name }}
    needs: [filter-matrix, build]
    if: ${{ (github.ref_name == 'main' || github.ref_name == 'nightly' || startsWith(github.ref_name, 'release/') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc')) || contains(github.event.pull_request.labels.*.name, 'Force All Tests[L0+L1+L2]')) && always() || success() }}
    strategy:
